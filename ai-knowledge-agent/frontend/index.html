<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 产品知识助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header p { font-size: 13px; opacity: 0.9; margin-top: 6px; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user .bubble { background: #667eea; color: white; }
        .assistant .bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }
        .sources {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            padding-left: 4px;
            max-width: 80%;
        }
        .sources strong { color: #333; }
        .sources a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }
        .sources a:hover { text-decoration: underline; }
        .input-area {
            display: flex;
            padding: 16px 20px;
            border-top: 1px solid #eee;
            gap: 12px;
            flex-shrink: 0;
            background: white;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area button {
            padding: 12px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #5a6fd6; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .loading-dots {
            display: inline-block;
            width: 20px;
            text-align: left;
        }
        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        .error-msg { color: #e74c3c; font-size: 13px; }
        .welcome-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #eee;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .welcome-card h3 { font-size: 15px; margin-bottom: 8px; color: #333; }
        .welcome-card p { font-size: 13px; color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 产品知识助手</h1>
            <p>基于公司知识库的智能问答系统 — 有问题随时问我</p>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="bubble">
                    <div class="welcome-card">
                        <h3>👋 欢迎使用 AI 产品知识助手</h3>
                        <p>我已经学习了公司知识库中的文档内容，可以帮你解答 AI 产品的使用问题。</p>
                        <p style="margin-top:6px">💡 小贴士：提问越具体，答案越精准。如果回答不够清楚，你可以追问。</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题，按 Enter 发送..." onkeypress="if(event.key==='Enter') send()">
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let history = [];

        function appendMessage(role, content, sources = '') {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            let html = `<div class="bubble">${content}</div>`;
            if (sources) {
                html += `<div class="sources"><strong>📎 参考来源：</strong><br>${sources.replace(/\n/g, '<br>')}</div>`;
            }
            div.innerHTML = html;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const query = input.value.trim();
            if (!query) return;

            appendMessage('user', query);
            input.value = '';
            btn.disabled = true;
            const loadingId = 'loading-' + Date.now();
            appendMessage('assistant', '<span class="loading-dots"></span>', '');

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, history })
                });
                const data = await res.json();

                // 移除 loading
                const msgs = document.querySelectorAll('.message.assistant');
                if (msgs.length > 0) msgs[msgs.length - 1].remove();

                appendMessage('assistant', data.answer, data.sources);

                history.push(
                    { role: 'user', content: query },
                    { role: 'assistant', content: data.answer }
                );
                if (history.length > 10) history = history.slice(-10);

            } catch (e) {
                const msgs = document.querySelectorAll('.message.assistant');
                if (msgs.length > 0) msgs[msgs.length - 1].remove();
                appendMessage('assistant', '<span class="error-msg">❌ 请求出错，请检查网络或服务是否正常运行</span>', '');
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
